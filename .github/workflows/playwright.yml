name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 1. Инсталираме зависимостите вътре в папката playwright
    - name: Install dependencies
      run: npm ci
      working-directory: playwright 

    # 2. Инсталираме браузърите вътре в папката playwright
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: playwright

    # 3. Пускаме тестовете вътре в папката playwright
    - name: Run Playwright tests
      run: npx playwright test
      working-directory: playwright

    # 4. Качваме репорта (пътят до него също е вътре в папката)
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright/playwright-report/
        retention-days: 30