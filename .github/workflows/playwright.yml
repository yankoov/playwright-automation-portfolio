name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # ИЗТРИХМЕ 'defaults' секцията от тук
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci # Махнахме working-directory
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps # Махнахме working-directory
    - name: Run Playwright tests
      run: npx playwright test # Махнахме working-directory
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/ # Променихме пътя на стандартен
        retention-days: 30